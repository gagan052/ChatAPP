# Render Deployment Configuration
# For more info, see https://render.com/docs/yaml-spec

services:
  # Backend Web Service
  - type: web
    name: chat-app-backend
    env: node
    plan: free
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001

  # Frontend Static Site
  - type: static
    name: chat-app-frontend
    env: static
    plan: free
    buildCommand: cd Frontend && npm install && npm run build
    publishPath: Frontend/dist
    routes:
      # Rewrites all routes to index.html for SPA support
      - type: rewrite
        source: /*
        destination: /index.html
      # Explicitly handle common routes as a fallback
      - type: rewrite
        source: /chat
        destination: /index.html
      - type: rewrite
        source: /signup
        destination: /index.html
      - type: rewrite
        source: /settings
        destination: /index.html
